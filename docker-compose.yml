services:
  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=aneriam_user
      - POSTGRES_PASSWORD=aneriam_password
      - POSTGRES_DB=aneriam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
